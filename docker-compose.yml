version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Simplificado para entorno universitario
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - reto_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - reto_network
    depends_on:
      elasticsearch:
        condition: service_healthy

  colector-datos:
    build: ./colector-datos
    container_name: colector-datos
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      # IMPORTANTE: Cambiar esto por tu API key real
      - TOMTOM_API_KEY=${TOMTOM_API_KEY}
      # Usar el nombre del servicio dentro de la red de Docker
      - ELASTIC_HOST=http://elasticsearch:9200
      # Habilitar logs en tiempo real
      - PYTHONUNBUFFERED=1
    networks:
      - reto_network
    restart: on-failure:5

volumes:
  es_data:

networks:
  reto_network:
    driver: bridge